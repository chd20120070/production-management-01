<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생산 공정 관리 시스템 (기록 저장형)</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); min-width: 1000px; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-row { display: flex; gap: 8px; align-items: center; margin-bottom: 15px; }
        .spacer { margin-left: auto; }
        
        button { padding: 10px 16px; border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: bold; font-size: 13px; }
        .btn-upload { background-color: #3498db; }
        .btn-done { background-color: #27ae60; }
        .btn-fail { background-color: #e74c3c; }
        .btn-record { background-color: #2c3e50; } /* 기록용 어두운 색상 */
        .btn-return { background-color: #8e44ad; }
        .btn-sel-del { background-color: #e67e22; }
        .btn-clear { background-color: #95a5a6; }

        .tab-menu { display: flex; border-bottom: 2px solid #dee2e6; }
        .tab-item { padding: 12px 25px; cursor: pointer; color: #7f8c8d; border: 1px solid transparent; }
        .tab-item.active { background: white; color: #3498db; font-weight: bold; border: 1px solid #dee2e6; border-bottom: 2px solid white; border-radius: 8px 8px 0 0; }
        
        .table-container { width: 100%; overflow-x: auto; border: 1px solid #ccc; max-height: 650px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
        th { background-color: #34495e; color: white; padding: 12px; position: sticky; top: 0; z-index: 5; }
        td { padding: 10px; border: 1px solid #ddd; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .col-check { width: 40px; }
        .col-pono { width: 120px; }
        .col-client { width: 150px; }
        .col-seq { width: 60px; }
        .col-product { width: 350px; text-align: left; }
        .col-qty { width: 80px; }
        .col-date { width: 100px; color: #2980b9; font-weight: bold; } /* 날짜 열 스타일 */

        #fileInput { display: none; }
        .sync-notice { font-size: 12px; margin-left: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h2>🚀 생산 공정 관리 시스템 <span id="syncStatus" class="sync-notice">연결 중...</span></h2>
        <div>
            <input type="file" id="fileInput" accept=".xlsx, .xls" onchange="handleFile(this)">
            <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📂 엑셀 파일 업로드</button>
        </div>
    </div>

    <div class="btn-row" id="actionButtons"></div>

    <div class="tab-menu">
        <div class="tab-item active" id="tab-all" onclick="changeTab('all')">⚙️ 공정 진행 (<span id="cnt-all">0</span>)</div>
        <div class="tab-item" id="tab-done" onclick="changeTab('done')">✅ 완료 (<span id="cnt-done">0</span>)</div>
        <div class="tab-item" id="tab-fail" onclick="changeTab('fail')">❌ 불가 (<span id="cnt-fail">0</span>)</div>
        <div class="tab-item" id="tab-wait" onclick="changeTab('wait')">📁 생산완료 기록 (<span id="cnt-wait">0</span>)</div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="col-check"><input type="checkbox" onclick="toggleAll(this)"></th>
                    <th class="col-pono">PONO</th>
                    <th class="col-client">주문거래처</th>
                    <th class="col-seq">순번</th>
                    <th class="col-product">품명</th>
                    <th class="col-qty">수량</th>
                    <th class="col-date">완료일자</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://gegxfkpoqfrpkqmgljde.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_r2mejtYg_SlSbbdZGsWBKQ_Q0KYbqvm';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dataStorage = { all: [], done: [], fail: [], wait: [] };
    let currentTab = 'all';

    fetchDataFromServer();

    async function fetchDataFromServer() {
        document.getElementById('syncStatus').innerText = "🔄 동기화 중...";
        const { data, error } = await _supabase.from('orders').select('*');
        if (error) {
            document.getElementById('syncStatus').innerText = "❌ 연결 실패";
        } else {
            dataStorage = { all: [], done: [], fail: [], wait: [] };
            data.forEach(item => {
                const t = item.status || 'all';
                if (dataStorage[t]) dataStorage[t].push(item);
            });
            render();
            document.getElementById('syncStatus').innerText = "✅ 실시간 동기화 완료";
            document.getElementById('syncStatus').style.color = "#2ecc71";
        }
    }

    function handleFile(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

            const newItems = [];
            rows.forEach((row, idx) => {
                if (idx === 0 || !row[0]) return;
                newItems.push({
                    status: 'all',
                    PONO: String(row[0] || ''),
                    주문거래처: String(row[1] || ''),
                    순번: String(row[2] || ''),
                    품명: String(row[3] || ''),
                    수량: String(row[4] || '').replace(/[^0-9.]/g, ''),
                    complete_date: '' // 초기엔 비어있음
                });
            });
            if (newItems.length > 0) {
                dataStorage.all = [...dataStorage.all, ...newItems];
                saveToServer();
            }
            input.value = '';
        };
        reader.readAsArrayBuffer(file);
    }

    async function saveToServer() {
        document.getElementById('syncStatus').innerText = "💾 저장 중...";
        await _supabase.from('orders').delete().neq('id', -1);
        const all = [];
        ['all', 'done', 'fail', 'wait'].forEach(t => {
            dataStorage[t].forEach(item => {
                const { id, created_at, ...cleanItem } = item;
                all.push({ ...cleanItem, status: t });
            });
        });
        if (all.length > 0) await _supabase.from('orders').insert(all);
        fetchDataFromServer();
    }

    function toggleAll(src) { document.querySelectorAll('.row-check').forEach(cb => cb.checked = src.checked); }
    function changeTab(t) { currentTab = t; render(); }

    // [핵심 변경] 이동 시 날짜 기록 로직 추가
    function moveSelected(tKey) {
        const cbs = document.querySelectorAll('.row-check:checked');
        if (cbs.length === 0) return alert('선택된 항목이 없습니다.');
        
        const today = new Date().toISOString().split('T')[0]; // 오늘 날짜 (YYYY-MM-DD)
        const idxs = Array.from(cbs).map(cb => parseInt(cb.dataset.idx)).sort((a,b)=>b-a);
        
        idxs.forEach(i => {
            let item = dataStorage[currentTab][i];
            
            // '생산완료 기록' 탭으로 보낼 때만 날짜를 찍음
            if (tKey === 'wait') {
                item.complete_date = today;
            } else if (tKey === 'all' || tKey === 'done') {
                // 다시 공정으로 돌아오면 날짜를 지울 수도 있음 (선택 사항)
                // item.complete_date = ''; 
            }
            
            dataStorage[tKey].push(item);
            dataStorage[currentTab].splice(i, 1);
        });
        saveToServer();
    }

    function deleteSelected() {
        const cbs = document.querySelectorAll('.row-check:checked');
        if (cbs.length === 0) return;
        if(confirm('삭제하시겠습니까?')) {
            const idxs = Array.from(cbs).map(cb => parseInt(cb.dataset.idx)).sort((a,b)=>b-a);
            idxs.forEach(i => dataStorage[currentTab].splice(i, 1));
            saveToServer();
        }
    }

    function clearAll() { if(confirm('전체 데이터를 초기화하시겠습니까?')) { dataStorage = {all:[],done:[],fail:[],wait:[]}; saveToServer(); } }

    function render() {
        const btnRow = document.getElementById('actionButtons');
        btnRow.innerHTML = `
            ${currentTab!=='all'?'<button class="btn-return" onclick="moveSelected(\'all\')">↩ 공정 진행 리턴</button>':''}
            ${currentTab!=='done'?'<button class="btn-done" onclick="moveSelected(\'done\')">생산완료 이동</button>':''}
            ${currentTab==='done'?'<button class="btn-record" onclick="moveSelected(\'wait\')">📁 생산기록 저장(오늘날짜)</button>':''}
            ${currentTab!=='fail'?'<button class="btn-fail" onclick="moveSelected(\'fail\')">완료불가 이동</button>':''}
            <div class="spacer"></div>
            <button class="btn-sel-del" onclick="deleteSelected()">선택 삭제</button>
            <button class="btn-clear" onclick="clearAll()">전체 초기화</button>
        `;

        const list = dataStorage[currentTab] || [];
        document.querySelectorAll('.tab-item').forEach(el => el.classList.toggle('active', el.id==='tab-'+currentTab));
        ['all','done','fail','wait'].forEach(t => document.getElementById('cnt-'+t).innerText = dataStorage[t].length);

        const tbody = document.getElementById('tbody');
        tbody.innerHTML = list.length === 0 ? '<tr><td colspan="7" style="padding:40px;">데이터가 없습니다.</td></tr>' :
            list.map((item, idx) => `
                <tr>
                    <td class="col-check"><input type="checkbox" class="row-check" data-idx="${idx}"></td>
                    <td class="col-pono">${item.PONO || ''}</td>
                    <td class="col-client">${item.주문거래처 || ''}</td>
                    <td class="col-seq">${item.순번 || ''}</td>
                    <td class="col-product" title="${item.품명 || ''}">${item.품명 || ''}</td>
                    <td class="col-qty">${item.수량 || ''}</td>
                    <td class="col-date">${item.complete_date || '-'}</td>
                </tr>
            `).join('');
    }
</script>
</body>
</html>
